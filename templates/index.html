<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        textarea {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .reset-btn {
            background: #f0f0f0;
            color: #333;
        }

        .reset-btn:hover {
            background: #e0e0e0;
        }

        .result {
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-weight: 600;
            font-size: 1.1em;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.positive {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result.negative {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .result.error {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .result-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .result-text {
            font-size: 1.3em;
        }

        .input-text {
            margin-top: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 5px;
            font-size: 0.9em;
            color: #666;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Sentiment Analysis</h1>
        <p class="subtitle">Analyze the sentiment of your text using AI</p>

        <form method="POST" action="/predict">
            <label for="text">Enter your text:</label>
            <textarea id="text" name="text" placeholder="Type something you want to analyze..." required></textarea>

            <div class="button-group">
                <button type="submit" class="submit-btn">Check Sentiment</button>
                <button type="reset" class="reset-btn">Clear</button>
            </div>
        </form>

        {% if prediction %}
            <div class="result show {% if error %}error{% elif prediction == 'Positive' %}positive{% else %}negative{% endif %}">
                <div class="result-label">Prediction:</div>
                <div class="result-text">{{ prediction }}</div>
                {% if text and not error %}
                    <div class="input-text">
                        <strong>Analyzed text:</strong> "{{ text }}"
                    </div>
                {% endif %}
            </div>
        {% endif %}
    </div>
</body>
</html>
